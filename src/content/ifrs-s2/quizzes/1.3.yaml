- question: "A company's governance disclosure states 'the Board Risk Committee oversees net-zero targets.' But the strategy section makes no mention of net-zero targets. What is the implication?"
  options:
    - "This is acceptable because governance and strategy are independent pillars"
    - "There is a coherence gap — the disclosure suggests governance of something not described elsewhere"
    - "The company is using the Para 7 integrated disclosure option correctly"
    - "The strategy section should be ignored if the governance section is detailed enough"
  answer: 1
  explanation: "IFRS S2's four pillars must tell a coherent, connected story. If governance claims oversight of a net-zero target, that target must appear in the strategy and metrics sections. Inconsistencies between pillars signal either poor disclosure quality or a gap between stated governance and actual strategy."

- question: "Under IFRS S2, which pillar is described as providing the 'accountability structure' that holds the other three together?"
  options:
    - "Strategy"
    - "Risk Management"
    - "Metrics and Targets"
    - "Governance"
  answer: 3
  explanation: "Governance disclosures describe the accountability structure — who is responsible, how they are informed, how they oversee targets, and how their pay is linked to outcomes. This structure provides the oversight framework within which strategy is approved, risk management is monitored, and metrics are reviewed."

- question: "The management's controls and procedures disclosure (Para 6(b)(ii)) is particularly important to investors because it signals what?"
  options:
    - "That the entity has a Chief Sustainability Officer"
    - "That the entity's sustainability report is externally assured"
    - "That climate data collection and reporting is supported by reliable internal systems"
    - "That the board has climate expertise"
  answer: 2
  explanation: "Controls and procedures over climate data signal that the information being reported — GHG emissions, climate risk assessments — is generated by reliable systems subject to oversight, not just informally assembled. This is the climate equivalent of internal financial controls, and gives investors greater confidence in the accuracy of disclosures."
