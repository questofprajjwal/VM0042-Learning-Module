- question: "What does IFRS S2 mean by 'absolute gross' GHG emissions?"
  options:
    - "Emissions normalised by revenue, before removing carbon credits"
    - "The total quantity of emissions before any offsets, not adjusted by output or revenue"
    - "Emissions calculated using the equity share approach only"
    - "Combined Scope 1 and Scope 2, excluding Scope 3"
  answer: 1
  explanation: "'Absolute' means the total quantity of emissions, not normalised or intensity-adjusted. 'Gross' means before removing any carbon credits or offsets. Entities must report gross absolute figures even if they also use carbon credits to reach a net target."

- question: "Under IFRS S2, an entity applying the GHG Protocol must choose between two consolidation approaches. Which are they?"
  options:
    - "Market-based and location-based"
    - "Equity share and control approach"
    - "Direct measurement and estimation"
    - "Absolute and intensity"
  answer: 1
  explanation: "The GHG Protocol Corporate Standard requires entities to choose between the equity share approach (emissions proportional to equity ownership) or the control approach (100% of emissions from operations under financial or operational control). IFRS S2 Application Guidance B27 requires entities to disclose which approach they use and why."

- question: "IFRS S2 requires Scope 2 emissions to be disclosed on a location-based basis. What does 'location-based' mean?"
  options:
    - "Using emission factors specific to the country where the entity is headquartered"
    - "Using average emission factors for the electricity grid(s) in the regions where energy is consumed"
    - "Using emission factors from the entity's specific electricity supplier"
    - "Reporting emissions only from facilities in high-emission countries"
  answer: 1
  explanation: "Location-based Scope 2 uses average grid emission factors for the regions where electricity is purchased and consumed. This reflects the actual carbon intensity of the electricity grid being used, in contrast to market-based methods that account for renewable energy contracts or certificates."

- question: "10 tonnes of methane (CH₄) need to be converted to CO₂ equivalent using IPCC AR6 values. The 100-year GWP for CH₄ is approximately 29.8. What is the CO₂e figure?"
  options:
    - "10 tCO₂e"
    - "29.8 tCO₂e"
    - "298 tCO₂e"
    - "2,980 tCO₂e"
  answer: 2
  explanation: "CO₂e = quantity × GWP = 10 tonnes × 29.8 = 298 tCO₂e. This conversion is central to aggregating all seven greenhouse gases into a single comparable figure as required by IFRS S2."
