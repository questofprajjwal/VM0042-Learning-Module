- question: "The IFRS S2 Scope 3 measurement framework identifies four input quality characteristics. Which of the following is one of them?"
  options:
    - "Lowest cost data sources available"
    - "Verified data (internally or externally assured)"
    - "Data sourced exclusively from direct measurement"
    - "GHG Protocol certified data only"
  answer: 1
  explanation: "Application Guidance B40 identifies four data quality characteristics to prioritise (in no particular order): (1) direct measurement data, (2) data from specific value chain activities (primary preferred over secondary), (3) timely, representative data, and (4) verified data. Verified data means data that has been reviewed by internal audit or external assurance."

- question: "A clothing company buys cotton from 500 farmers across 12 countries. It uses the industry-average Scope 3 Category 1 emission factor for cotton rather than farm-specific data. What is this type of data called?"
  options:
    - "Primary data"
    - "Direct measurement data"
    - "Secondary data"
    - "Verified data"
  answer: 2
  explanation: "Industry-average emission factors are secondary data — they represent typical values across many entities/sources rather than data from the specific value chain activities of this entity. Primary data would be farm-specific measurements or emissions reports provided directly by the individual farmers in this company's supply chain."

- question: "The IFRS S2 Scope 3 measurement formula for estimation is: Emissions = Activity Data × Emission Factor. If a company transports 50,000 tonnes of goods by road for an average of 200 km, and the emission factor for road freight is 0.0001 tCO₂e per tonne-km, what are the emissions?"
  options:
    - "5 tCO₂e"
    - "100 tCO₂e"
    - "1,000 tCO₂e"
    - "10,000 tCO₂e"
  answer: 2
  explanation: "Activity data = 50,000 tonnes × 200 km = 10,000,000 tonne-km. Emissions = 10,000,000 × 0.0001 = 1,000 tCO₂e. This is a Category 4 (upstream transportation) calculation using the tonne-km activity basis."

- question: "B57 provides a backstop if estimating Scope 3 is 'impracticable.' What must the entity still disclose?"
  options:
    - "Nothing — impracticability is a complete exemption"
    - "Why estimation is impracticable and how the entity is managing those Scope 3 emissions"
    - "An estimate of Scope 1 and Scope 2 only"
    - "The entity must confirm impracticability with an external auditor"
  answer: 1
  explanation: "B57 provides that if estimation is genuinely impracticable (a high threshold — not merely inconvenient), the entity must disclose: (a) why estimation is impracticable for that category, and (b) how the entity is managing emissions in that category. It is not a free pass — the entity still demonstrates awareness and management of the relevant Scope 3 source."
